{% load i18n %}

<!DOCTYPE html>
<html>
  <body style="margin:0; padding:0; background-color:#f4f4f4; font-family: Arial, sans-serif;">

    <table width="100%" cellpadding="0" cellspacing="0" style="padding:20px;">
      <tr>
        <td align="center">

          <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff; padding:30px; border-radius:8px;">
              
            <tr>
              <td style="text-align:center; padding-bottom:20px;">
                <a href="https://ella-prime.com" style="text-decoration:none; font-size:24px; font-weight:bold; color:#000;">
                  EllaPrimE
                </a>
              </td>
            </tr>

            <tr>
              <td style="color:#333; font-size:16px; line-height:1.5;">
                <h2 style="margin-top:0;">Hi {{ user_name }},</h2>

                <p>{% trans 'We received your message:' %}</p>

                <blockquote style="margin:15px 0; padding:10px; background:#f9f9f9; border-left:4px solid #ccc;">
                  {{ message }}
                </blockquote>

                <p>{% trans 'We will get back to you shortly.' %}</p>

                <p>{% trans 'Thank you,' %}<br>EllaPrimE {% trans 'Team' %}</p>
              </td>
            </tr>

          </table>

        </td>
      </tr>
    </table>

  </body>
</html>
