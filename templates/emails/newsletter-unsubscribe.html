{% load i18n %}
{% load static %}

<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
    <title>{% trans "Unsubscribe from our newsletter" %}</title>
</head>
<body>
<h1>{% trans "Confirm to unsubscribe from our newsletter." %}</h1>
<form action="{% url 'newsletter-unsubscribe' subscriber.token %}" method="post">
    {% csrf_token %}
    <button type="submit" class="common-button">{% trans "Unsubscribe" %}</button>
</form>
</body>
</html>
