{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ella Prime — Check your email</title>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
<div class="auth-card">
    <div class="auth-logo">{% include "common/logo.html" %}</div>
    <div class="auth-header">
        <h1>Check your email</h1>
        <p>
            If an account exists for that address, we've sent a
            password reset link. It may take a few minutes to arrive.
        </p>
    </div>
    <p class="auth-footer">
        <a href="{% url 'login' %}">← Back to sign in</a>
    </p>
</div>
</body>
</html>
