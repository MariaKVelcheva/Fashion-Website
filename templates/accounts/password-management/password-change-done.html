{% load static %}
{% load i18n %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ella Prime — {% trans 'Password updated' %}</title>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
<div class="auth-card">
    <div class="auth-logo">{% include "common/logo.html" %}</div>
    <div class="auth-header">
        <h1>{% trans 'Password updated' %}</h1>
        <p>{% trans 'Your password has been changed successfully.' %}</p>
    </div>
    <a href="{% url 'customer-details' %}" class="auth-btn" style="text-align:center; display:block;">
        {% trans 'Back to my account' %}
    </a>
</div>
</body>
</html>
