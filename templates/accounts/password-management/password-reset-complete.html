{% load static %}
{% load i18n %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ella Prime — {% trans 'Password reset' %}</title>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
<div class="auth-card">
    <div class="auth-logo">{% include "common/logo.html" %}</div>
    <div class="auth-header">
        <h1>{% trans 'All done' %}</h1>
        <p>{% trans 'Your password has been reset. You can now sign in with your new password.' %}</p>
    </div>
    <a href="{% url 'login' %}" class="auth-btn" style="text-align:center; display:block;">
        {% trans 'Sign in' %}
    </a>
</div>
</body>
</html>
