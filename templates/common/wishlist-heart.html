{% if request.user.is_authenticated %}
<button type="button"
        class="wishlist-btn"
        data-url="{% url 'toggle-wishlist' garment.id %}"
        data-garment-id="{{ garment.id }}"
        aria-label="{% if garment.id in user_wishlist %}Remove from wishlist{% else %}Add to wishlist{% endif %}">
    <i class="fa-heart {% if garment.id in user_wishlist %}fa-solid{% else %}fa-regular{% endif %}"></i>
</button>
{% endif %}

<script>
if (!window._wishlistInitialised) {
    window._wishlistInitialised = true;

    function getCSRFToken() {
        const cookie = document.cookie
            .split(";")
            .map(c => c.trim())
            .find(c => c.startsWith("csrftoken="));
        return cookie ? cookie.split("=")[1] : "";
    }

    document.addEventListener("click", function (e) {
        const btn = e.target.closest(".wishlist-btn");
        if (!btn) return;

        e.preventDefault();

        const url       = btn.dataset.url;
        const icon      = btn.querySelector("i");

        fetch(url, {
            method: "POST",
            headers: {
                "X-CSRFToken": getCSRFToken(),
                "X-Requested-With": "XMLHttpRequest",
            },
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === "added") {
                icon.classList.remove("fa-regular");
                icon.classList.add("fa-solid");
                btn.setAttribute("aria-label", "Remove from wishlist");
            } else {
                icon.classList.remove("fa-solid");
                icon.classList.add("fa-regular");
                btn.setAttribute("aria-label", "Add to wishlist");
            }
        })
        .catch(err => console.error("Wishlist toggle failed:", err));
    });
}
</script>
