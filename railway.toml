[build]
builder = "nixpacks"

[deploy]
startCommand = "gunicorn fashionWebsite.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"

[[deploy.releaseCommands]]
command = "python manage.py migrate --noinput"

[[deploy.releaseCommands]]
command = "python manage.py collectstatic --noinput"