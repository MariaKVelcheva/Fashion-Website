services:
  - type: web
    name: fashion-website
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput"
    startCommand: "gunicorn fashionWebsite.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fashion-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.0

databases:
  - name: fashion-db
    databaseName: fashion_db
    user: fashion_user